<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo | Creative Developer</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --accent: #ff0055;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; line-height: 1.6; }
        
        /* Layout de Colunas */
        .page-wrapper { max-width: 1100px; margin: 0 auto; padding: 100px 24px; display: grid; grid-template-columns: 300px 1fr; gap: 80px; }
        
        /* Sidebar (Cartão de Visita) */
        .sidebar { position: sticky; top: 100px; height: fit-content; }
        .sidebar h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 16px; }
        .sidebar p { color: var(--text-dim); margin-bottom: 24px; }
        .contact-links { display: flex; flex-direction: column; gap: 12px; }
        .contact-links a { color: var(--accent); font-weight: 600; }

        /* Conteúdo Principal */
        .section-title { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px; }
        .project-card { 
            background: var(--surface); padding: 32px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
        }
        .project-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .project-card h3 { font-size: 1.25rem; margin-bottom: 12px; }
        .project-card p { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <h1>Ricardo.</h1>
            <p>Creative Developer & Tech Enthusiast.</p>
            <div class="contact-links">
                <a href="mailto:ricardo.ml96@gmail.com">ricardo.ml96@gmail.com</a>
                <a href="https://github.com/Ricml96">GitHub Profile</a>
            </div>
        </aside>

        <main>
            <div class="section-title">Projetos em Construção</div>
            <div class="grid">
                <div class="project-card">
                    <h3>Projeto Alpha</h3>
                    <p>O conceito inicial que irá definir a minha abordagem de desenvolvimento.</p>
                </div>
                <div class="project-card">
                    <h3>Ferramenta Beta</h3>
                    <p>Uma solução de automação focada em performance e facilidade de uso.</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
