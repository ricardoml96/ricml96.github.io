<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricardo | Creative Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --text: #ededed;
            --accent: #00ff9d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }
        
        /* Cursor Seguinte */
        .cursor {
            width: 8px; height: 8px; background: var(--accent);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 999; transition: transform 0.1s;
        }

        .main { padding: 100px 10%; display: grid; grid-template-columns: 1fr 1fr; gap: 100px; align-items: center; }
        
        h1 { font-size: 8rem; line-height: 0.9; font-weight: 700; margin-bottom: 2rem; }
        .bio { font-size: 1.2rem; color: #888; max-width: 400px; }
        
        /* Glass Card */
        .card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px; border-radius: 30px;
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
        }

        .project-list { list-style: none; }
        .project-item { padding: 30px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .project-item:hover { color: var(--accent); cursor: pointer; }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>

    <main class="main">
        <section>
            <h1>RICARDO</h1>
            <p class="bio">Desenvolvedor focado em experiências digitais imersivas. O código é a minha ferramenta, o design é a minha assinatura.</p>
        </section>

        <section class="card">
            <ul class="project-list">
                <li class="project-item"><span>01. PORTFOLIO_V1</span> <span>2026</span></li>
                <li class="project-item"><span>02. AUTO_SYSTEM</span> <span>2026</span></li>
                <li class="project-item"><span>03. CLOUD_LABS</span> <span>2026</span></li>
            </ul>
        </section>
    </main>

    <script>
        const cursor = document.getElementById('cursor');
        window.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
